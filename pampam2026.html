<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крок Симулятор (150 тестів)</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Іконки
        const CheckCircle2Icon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const XCircleIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;
        const ArrowRightIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
        const RefreshCcwIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>;
        const BookOpenIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const InfoIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
        const FlagIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>;

        function App() {
            const [inputMode, setInputMode] = useState(true);
            const [rawQ, setRawQ] = useState("");
            const [rawA, setRawA] = useState("");
            const [error, setError] = useState("");

            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [history, setHistory] = useState([]);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [isCorrect, setIsCorrect] = useState(null);
            const [quizFinished, setQuizFinished] = useState(false);
            const [startQuestionNumber, setStartQuestionNumber] = useState(1);

            const parseData = () => {
                try {
                    const parsedQuestions = [];
                    const qBlocks = rawQ.split(/(?:^|\n)(?=\s*\d+\.\s)/).filter(b => b.trim() && /^\s*\d+\./.test(b));
                    const aBlocks = rawA.split(/(?:^|\n)(?=\s*\d+\.\sВідповідь:)/).filter(b => b.trim() && /^\s*\d+\./.test(b));

                    if (qBlocks.length === 0 || aBlocks.length === 0) {
                        throw new Error("Не вдалося знайти тести. Перевір, чи правильно вставлено текст у поля.");
                    }

                    qBlocks.forEach((block) => {
                        const qMatch = block.match(/^\s*(\d+)\.\s([\s\S]*?)(?=\n\s*[A-EА-Еa-eа-еДд]\.)/);
                        const optMatches = block.match(/^[A-EА-Еa-eа-еДд]\.\s.*$/gm);
                        
                        if (qMatch && optMatches) {
                            const questionId = qMatch[1];
                            const questionText = qMatch[2].trim();
                            const options = optMatches.map(o => o.trim());
                            
                            const aBlock = aBlocks.find(a => a.trim().startsWith(questionId + '.'));
                            
                            if (aBlock) {
                                const ansMatch = aBlock.match(/Відповідь:\s*([A-EА-Еa-eа-еДд])\.\s*(.*?)(?=\nПояснення:|$)/);
                                const expMatch = aBlock.match(/Пояснення:\s*([\s\S]*)$/);

                                if (ansMatch) {
                                    const correctLetter = ansMatch[1];
                                    const correctText = ansMatch[2].trim();
                                    const explanation = expMatch ? expMatch[1].trim() : "Пояснення відсутнє.";
                                    
                                    const normalize = (char) => {
                                        const map = {'А':'A', 'В':'B', 'С':'C', 'Е':'E', 'Д':'D'};
                                        return map[char.toUpperCase()] || char.toUpperCase();
                                    };

                                    const correctFullOption = options.find(o => normalize(o.charAt(0)) === normalize(correctLetter));

                                    parsedQuestions.push({
                                        id: questionId,
                                        question: questionText,
                                        options: options,
                                        correctAnswer: correctFullOption || `${correctLetter}. ${correctText}`,
                                        explanation: explanation
                                    });
                                }
                            }
                        }
                    });

                    if (parsedQuestions.length === 0) {
                        throw new Error("Парсер не зміг розпізнати формат. Переконайся, що питання починаються з цифри (наприклад, '1. '), а варіанти з букви (наприклад, 'А. ')");
                    }

                    setQuestions(parsedQuestions);
                    setInputMode(false);
                    
                    let startIdx = startQuestionNumber - 1;
                    if (startIdx < 0 || startIdx >= parsedQuestions.length) startIdx = 0;
                    setCurrentIndex(startIdx);
                    setError("");

                } catch (err) {
                    setError(err.message);
                }
            };

            const handleAnswerClick = (option) => {
                if (selectedAnswer !== null) return;
                const currentQuestion = questions[currentIndex];
                const correct = option === currentQuestion.correctAnswer;
                
                setSelectedAnswer(option);
                setIsCorrect(correct);
                
                if (correct) setScore(prev => prev + 1);
                
                setHistory(prev => [...prev, {
                    numId: currentQuestion.id,
                    question: currentQuestion.question,
                    userAnswer: option,
                    correctAnswer: currentQuestion.correctAnswer,
                    explanation: currentQuestion.explanation,
                    isCorrect: correct
                }]);
            };

            const handleNextQuestion = () => {
                if (currentIndex + 1 < questions.length) {
                    setCurrentIndex(currentIndex + 1);
                    setSelectedAnswer(null);
                    setIsCorrect(null);
                } else {
                    setQuizFinished(true);
                }
            };

            const restartQuiz = () => {
                setInputMode(true);
                setScore(0);
                setHistory([]);
                setSelectedAnswer(null);
                setIsCorrect(null);
                setQuizFinished(false);
            };

            if (inputMode) {
                return (
                    <div className="min-h-screen py-10 px-4 flex items-center justify-center">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-5xl w-full">
                            <div className="flex items-center gap-3 mb-6">
                                <BookOpenIcon />
                                <h1 className="text-3xl font-bold text-slate-800">Налаштування Крок-Симулятора</h1>
                            </div>
                            <p className="text-slate-600 mb-8">Скопіюй текст із файлу з питаннями у перше поле, а текст із відповідями та поясненнями — у друге. Додаток автоматично їх об'єднає!</p>
                            
                            <div className="grid md:grid-cols-2 gap-6 mb-8">
                                <div>
                                    <label className="block font-semibold mb-2 text-slate-700">Текст питань (Буклет):</label>
                                    <textarea 
                                        className="w-full h-80 p-4 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none resize-none font-mono text-sm"
                                        placeholder="Встав сюди текст формату:&#10;1. Пацієнт із хронічним...&#10;А. Тимпанопластика&#10;В. Мобілізація..."
                                        value={rawQ}
                                        onChange={e => setRawQ(e.target.value)}
                                    />
                                </div>
                                <div>
                                    <label className="block font-semibold mb-2 text-slate-700">Текст відповідей з поясненнями:</label>
                                    <textarea 
                                        className="w-full h-80 p-4 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none resize-none font-mono text-sm"
                                        placeholder="Встав сюди текст формату:&#10;1. Відповідь: A. Тимпанопластика&#10;Пояснення: Мезотимпаніт — це..."
                                        value={rawA}
                                        onChange={e => setRawA(e.target.value)}
                                    />
                                </div>
                            </div>

                            <div className="flex items-end gap-6">
                                <div className="w-48">
                                    <label className="block font-semibold mb-2 text-slate-700">Почати з питання №:</label>
                                    <input 
                                        type="number" min="1" value={startQuestionNumber}
                                        onChange={e => setStartQuestionNumber(parseInt(e.target.value)||1)}
                                        className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"
                                    />
                                </div>
                                <button onClick={parseData} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md">
                                    Згенерувати тести
                                </button>
                            </div>
                            
                            {error && <div className="mt-6 p-4 bg-red-50 text-red-700 rounded-xl flex items-center gap-3 border border-red-200">
                                <XCircleIcon /> {error}
                            </div>}
                        </div>
                    </div>
                );
            }

            if (quizFinished) {
                const answeredCount = history.length;
                const percentage = answeredCount > 0 ? Math.round((score / answeredCount) * 100) : 0;

                return (
                    <div className="min-h-screen py-8 px-4 sm:px-6">
                        <div className="max-w-4xl mx-auto">
                            <div className="bg-white p-8 rounded-2xl shadow-xl text-center mb-8 border border-slate-100">
                                <div className="mb-6 text-6xl">{percentage >= 80 ? '🏆' : percentage >= 60 ? '👍' : '📚'}</div>
                                <h2 className="text-3xl font-bold text-slate-800 mb-2">Тест завершено!</h2>
                                <p className="text-slate-600 mb-6">Ваш результат: {score} з {answeredCount} правильних.</p>
                                
                                <div className="w-full bg-slate-100 rounded-full h-4 mb-8 overflow-hidden">
                                    <div className={`h-4 rounded-full ${percentage >= 60 ? 'bg-green-500' : 'bg-amber-500'}`} style={{ width: `${percentage}%` }}></div>
                                </div>
                                <div className="text-4xl font-black text-slate-800 mb-8">{percentage}%</div>

                                <button onClick={restartQuiz} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl flex items-center justify-center gap-2 shadow-md">
                                    <RefreshCcwIcon /> Повернутися до налаштувань
                                </button>
                            </div>

                            {history.length > 0 && (
                                <div className="bg-white p-6 sm:p-8 rounded-2xl shadow-xl border border-slate-100">
                                    <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                        <BookOpenIcon /> Детальний розбір відповідей:
                                    </h3>
                                    <div className="space-y-6">
                                        {history.map((h, i) => (
                                            <div key={i} className={`p-5 rounded-xl border text-left ${h.isCorrect ? 'bg-green-50/50 border-green-200' : 'bg-red-50/50 border-red-200'}`}>
                                                <p className="font-medium text-slate-800 mb-4 whitespace-pre-wrap"><span className="text-slate-500 mr-2">#{h.numId}</span>{h.question}</p>
                                                <div className="flex flex-col gap-3 text-sm">
                                                    
                                                    <div className={`flex items-start gap-3 p-3 rounded-lg border ${h.isCorrect ? 'text-green-800 bg-green-100 border-green-200' : 'text-red-800 bg-red-100 border-red-200'}`}>
                                                        <span className={`mt-0.5 ${h.isCorrect ? 'text-green-600' : 'text-red-600'}`}>
                                                            {h.isCorrect ? <CheckCircle2Icon /> : <XCircleIcon />}
                                                        </span>
                                                        <div><strong className="block mb-0.5 opacity-80">Ваша відповідь:</strong> {h.userAnswer}</div>
                                                    </div>

                                                    {!h.isCorrect && (
                                                        <div className="flex items-start gap-3 text-green-800 bg-green-100 p-3 rounded-lg border border-green-200">
                                                            <span className="mt-0.5 text-green-600"><CheckCircle2Icon /></span>
                                                            <div><strong className="block mb-0.5 opacity-80">Правильна відповідь:</strong> {h.correctAnswer}</div>
                                                        </div>
                                                    )}

                                                    <div className="mt-2 p-4 bg-white text-slate-700 rounded-lg text-sm border border-slate-200 shadow-sm">
                                                        <strong className="flex items-center gap-1.5 mb-1 text-slate-800"><InfoIcon /> Пояснення:</strong> 
                                                        {h.explanation}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            const currentQ = questions[currentIndex];
            const startIdx = startQuestionNumber - 1 >= 0 ? startQuestionNumber - 1 : 0;
            const answeredCountSoFar = history.length;
            const livePercentage = answeredCountSoFar > 0 ? Math.round((score / answeredCountSoFar) * 100) : 0;

            return (
                <div className="min-h-screen py-8 px-4 sm:px-6">
                    <div className="max-w-3xl mx-auto">
                        <div className="flex flex-wrap items-center justify-between gap-4 mb-6">
                            <div className="flex items-center gap-2 text-blue-600">
                                <BookOpenIcon /> <span className="font-semibold text-slate-700">Крок-2</span>
                            </div>
                            <div className="flex flex-wrap items-center gap-2">
                                <div className="text-sm font-medium text-green-700 bg-green-50 border border-green-100 px-4 py-1.5 rounded-full shadow-sm flex items-center gap-1.5">
                                    Успішність: {livePercentage}%
                                </div>
                                <div className="text-sm font-medium text-slate-500 bg-white border border-slate-200 px-4 py-1.5 rounded-full shadow-sm">
                                    Питання {currentIndex + 1} з {questions.length}
                                </div>
                                <button onClick={() => setQuizFinished(true)} className="bg-red-50 text-red-600 hover:bg-red-100 hover:text-red-700 text-sm font-bold py-1.5 px-4 rounded-full transition-colors border border-red-200 flex items-center gap-1 shadow-sm">
                                    <FlagIcon /> Завершити тест
                                </button>
                            </div>
                        </div>

                        <div className="w-full bg-slate-200 rounded-full h-2 mb-8 overflow-hidden shadow-inner">
                            <div className="bg-blue-600 h-2 rounded-full transition-all duration-300" style={{ width: `${((currentIndex) / questions.length) * 100}%` }}></div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-lg p-6 sm:p-8 mb-6 border border-slate-100">
                            <div className="text-sm text-slate-400 font-mono mb-2">#{currentQ.id}</div>
                            <h2 className="text-lg sm:text-xl text-slate-800 font-medium leading-relaxed whitespace-pre-wrap">{currentQ.question}</h2>
                        </div>

                        <div className="space-y-3 mb-6">
                            {currentQ.options.map((option, idx) => {
                                const isSelected = selectedAnswer === option;
                                const isCorrectAnswer = option === currentQ.correctAnswer;
                                
                                let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 relative overflow-hidden flex justify-between items-center ";
                                
                                if (selectedAnswer === null) {
                                    btnClass += "border-slate-200 bg-white hover:border-blue-400 hover:bg-blue-50 text-slate-700 cursor-pointer shadow-sm";
                                } else {
                                    if (isCorrectAnswer) btnClass += "border-green-500 bg-green-50 text-green-900 shadow-sm";
                                    else if (isSelected) btnClass += "border-red-500 bg-red-50 text-red-900 shadow-sm";
                                    else btnClass += "border-slate-200 bg-slate-50 text-slate-400 opacity-60";
                                    btnClass += " cursor-default";
                                }

                                return (
                                    <button key={idx} onClick={() => handleAnswerClick(option)} disabled={selectedAnswer !== null} className={btnClass}>
                                        <span className="pr-8">{option}</span>
                                        {selectedAnswer !== null && isCorrectAnswer && <span className="text-green-600 absolute right-4"><CheckCircle2Icon /></span>}
                                        {selectedAnswer !== null && isSelected && !isCorrectAnswer && <span className="text-red-600 absolute right-4"><XCircleIcon /></span>}
                                    </button>
                                );
                            })}
                        </div>

                        {selectedAnswer !== null && (
                            <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 mb-8 animate-in fade-in slide-in-from-bottom-2 shadow-sm">
                                <h3 className="text-blue-800 font-semibold mb-2 flex items-center gap-2">
                                    <InfoIcon /> Пояснення:
                                </h3>
                                <p className="text-blue-900 leading-relaxed text-sm sm:text-base">
                                    {currentQ.explanation}
                                </p>
                            </div>
                        )}

                        <div className="flex justify-end h-14">
                            {selectedAnswer !== null && (
                                <button onClick={handleNextQuestion} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl flex items-center gap-2 shadow-md">
                                    Наступне <ArrowRightIcon />
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
