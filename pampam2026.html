                    "А. Ентероколіт", 
                    "В. Муковісцидоз", 
                    "С. Лактазна недостатність", 
                    "D. Фенілкетонурія", 
                    "Е. Целіакія"
                ],
                correctAnswer: "Е. Целіакія",
                explanation: "Симптоми (діарея, великий живіт, затримка розвитку) з'явилися після введення манної каші (містить глютен). Це класична маніфестація целіакії (глютенова ентеропатія)."
            }
        ];

        function App() {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [history, setHistory] = useState([]);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [isCorrect, setIsCorrect] = useState(null);
            const [quizFinished, setQuizFinished] = useState(false);
            const [startQuestionNumber, setStartQuestionNumber] = useState(1);
            const [isStarted, setIsStarted] = useState(false);

            const startQuiz = () => {
                let startIdx = startQuestionNumber - 1;
                if (startIdx < 0 || startIdx >= questionsData.length) startIdx = 0;
                setCurrentIndex(startIdx);
                setIsStarted(true);
            };

            const handleAnswerClick = (option) => {
                if (selectedAnswer !== null) return;
                const currentQuestion = questionsData[currentIndex];
                const correct = option === currentQuestion.correctAnswer;
                
                setSelectedAnswer(option);
                setIsCorrect(correct);
                
                if (correct) setScore(prev => prev + 1);
                
                setHistory(prev => [...prev, {
                    numId: currentQuestion.id,
                    question: currentQuestion.question,
                    userAnswer: option,
                    correctAnswer: currentQuestion.correctAnswer,
                    explanation: currentQuestion.explanation,
                    isCorrect: correct
                }]);
            };

            const handleNextQuestion = () => {
                if (currentIndex + 1 < questionsData.length) {
                    setCurrentIndex(currentIndex + 1);
                    setSelectedAnswer(null);
                    setIsCorrect(null);
                } else {
                    setQuizFinished(true);
                }
            };

            const restartQuiz = () => {
                setIsStarted(false);
                setScore(0);
                setHistory([]);
                setSelectedAnswer(null);
                setIsCorrect(null);
                setQuizFinished(false);
            };

            if (!isStarted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full text-center">
                            <div className="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                                <span className="text-blue-600"><BookOpenIcon /></span>
                            </div>
                            <h1 className="text-2xl font-bold text-slate-800 mb-2">Крок-2 Симулятор</h1>
                            <p className="text-slate-600 mb-6">Завантажено питань: {questionsData.length}</p>
                            
                            <div className="mb-8 text-left bg-slate-50 p-4 rounded-xl border border-slate-200">
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Почати з питання №:</label>
                                <input 
                                    type="number" min="1" max={questionsData.length || 1} value={startQuestionNumber}
                                    onChange={(e) => setStartQuestionNumber(parseInt(e.target.value) || 1)}
                                    className="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
                                />
                            </div>
                            
                            <button onClick={startQuiz} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition-all shadow-md">
                                Розпочати
                            </button>
                        </div>
                    </div>
                );
            }

            if (quizFinished) {
                const answeredCount = history.length;
                const percentage = answeredCount > 0 ? Math.round((score / answeredCount) * 100) : 0;
                const mistakes = history.filter(h => !h.isCorrect);

                return (
                    <div className="min-h-screen py-8 px-4 sm:px-6">
                        <div className="max-w-4xl mx-auto">
                            <div className="bg-white p-8 rounded-2xl shadow-xl text-center mb-8 border border-slate-100">
                                <div className="mb-6 text-6xl">{percentage >= 80 ? '🏆' : percentage >= 60 ? '👍' : '📚'}</div>
                                <h2 className="text-3xl font-bold text-slate-800 mb-2">Тест завершено!</h2>
                                <p className="text-slate-600 mb-6">Ваш результат: {score} з {answeredCount} правильних.</p>
                                
                                <div className="w-full bg-slate-100 rounded-full h-4 mb-8 overflow-hidden">
                                    <div className={`h-4 rounded-full ${percentage >= 60 ? 'bg-green-500' : 'bg-amber-500'}`} style={{ width: `${percentage}%` }}></div>
                                </div>
                                <div className="text-4xl font-black text-slate-800 mb-8">{percentage}%</div>

                                <button onClick={restartQuiz} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl flex items-center justify-center gap-2 shadow-md mx-auto">
                                    <RefreshCcwIcon /> Пройти ще раз
                                </button>
                            </div>

                            {mistakes.length > 0 ? (
                                <div className="bg-white p-6 sm:p-8 rounded-2xl shadow-xl border border-slate-100">
                                    <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                        <XCircleIcon /> Аналіз помилок ({mistakes.length}):
                                    </h3>
                                    <div className="space-y-6">
                                        {mistakes.map((m, i) => (
                                            <div key={i} className="p-5 rounded-xl border border-red-200 bg-red-50/30 text-left">
                                                <p className="font-medium text-slate-800 mb-4 whitespace-pre-wrap">
                                                    <span className="text-slate-500 mr-2">#{m.numId}</span>{m.question}
                                                </p>
                                                <div className="flex flex-col gap-3 text-sm">
                                                    <div className="flex items-start gap-3 p-3 rounded-lg border text-red-800 bg-red-100 border-red-200">
                                                        <span className="mt-0.5 text-red-600"><XCircleIcon /></span>
                                                        <div><strong className="block mb-0.5 opacity-80">Твоя відповідь:</strong> {m.userAnswer}</div>
                                                    </div>
                                                    <div className="flex items-start gap-3 text-green-800 bg-green-100 p-3 rounded-lg border border-green-200">
                                                        <span className="mt-0.5 text-green-600"><CheckCircle2Icon /></span>
                                                        <div><strong className="block mb-0.5 opacity-80">Правильна відповідь:</strong> {m.correctAnswer}</div>
                                                    </div>
                                                    <div className="mt-2 p-4 bg-white text-slate-700 rounded-lg text-sm border border-slate-200 shadow-sm">
                                                        <strong className="flex items-center gap-1.5 mb-1 text-slate-800"><InfoIcon /> Пояснення:</strong> 
                                                        {m.explanation}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : answeredCount > 0 ? (
                                <div className="bg-green-50 p-8 rounded-2xl border border-green-200 text-center text-green-800 shadow-md">
                                    <span className="inline-block mb-3 text-green-600"><CheckCircle2Icon /></span>
                                    <h3 className="text-2xl font-bold mb-2">Блискуче!</h3>
                                    <p>Ти не зробила жодної помилки.</p>
                                </div>
                            ) : null}
                        </div>
                    </div>
                );
            }

            const currentQ = questionsData[currentIndex];
            const answeredCountSoFar = history.length;
            const livePercentage = answeredCountSoFar > 0 ? Math.round((score / answeredCountSoFar) * 100) : 0;

            return (
                <div className="min-h-screen py-8 px-4 sm:px-6">
                    <div className="max-w-3xl mx-auto">
                        
                        <div className="flex flex-wrap items-center justify-between gap-4 mb-6">
                            <div className="flex items-center gap-2 text-blue-600">
                                <BookOpenIcon /> <span className="font-semibold text-slate-700">Крок-2</span>
                            </div>
                            <div className="flex flex-wrap items-center gap-2">
                                <div className="text-sm font-medium text-green-700 bg-green-50 border border-green-100 px-4 py-1.5 rounded-full shadow-sm flex items-center gap-1.5">
                                    Успішність: {livePercentage}%
                                </div>
                                <div className="text-sm font-medium text-slate-500 bg-white border border-slate-200 px-4 py-1.5 rounded-full shadow-sm">
                                    Питання {currentIndex + 1} з {questionsData.length}
                                </div>
                                <button 
                                    onClick={() => setQuizFinished(true)} 
                                    className="bg-red-50 text-red-600 hover:bg-red-100 hover:text-red-700 text-sm font-bold py-1.5 px-4 rounded-full transition-colors border border-red-200 flex items-center gap-1 shadow-sm cursor-pointer"
                                >
                                    <FlagIcon /> Завершити тест
                                </button>
                            </div>
                        </div>

                        <div className="w-full bg-slate-200 rounded-full h-2 mb-8 overflow-hidden shadow-inner">
                            <div className="bg-blue-600 h-2 rounded-full transition-all duration-300" style={{ width: `${((currentIndex) / questionsData.length) * 100}%` }}></div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-lg p-6 sm:p-8 mb-6 border border-slate-100">
                            <div className="text-sm text-slate-400 font-mono mb-2">#{currentQ.id}</div>
                            <h2 className="text-lg sm:text-xl text-slate-800 font-medium leading-relaxed whitespace-pre-wrap">{currentQ.question}</h2>
                        </div>

                        <div className="space-y-3 mb-6">
                            {currentQ.options.map((option, idx) => {
                                const isSelected = selectedAnswer === option;
                                const isCorrectAnswer = option === currentQ.correctAnswer;
                                
                                let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 relative overflow-hidden flex justify-between items-center ";
                                
                                if (selectedAnswer === null) {
                                    btnClass += "border-slate-200 bg-white hover:border-blue-400 hover:bg-blue-50 text-slate-700 cursor-pointer shadow-sm";
                                } else {
                                    if (isCorrectAnswer) btnClass += "border-green-500 bg-green-50 text-green-900 shadow-sm";
                                    else if (isSelected) btnClass += "border-red-500 bg-red-50 text-red-900 shadow-sm";
                                    else btnClass += "border-slate-200 bg-slate-50 text-slate-400 opacity-60";
                                    btnClass += " cursor-default";
                                }

                                return (
                                    <button key={idx} onClick={() => handleAnswerClick(option)} disabled={selectedAnswer !== null} className={btnClass}>
                                        <span className="pr-8">{option}</span>
                                        {selectedAnswer !== null && isCorrectAnswer && <span className="text-green-600 absolute right-4"><CheckCircle2Icon /></span>}
                                        {selectedAnswer !== null && isSelected && !isCorrectAnswer && <span className="text-red-600 absolute right-4"><XCircleIcon /></span>}
                                    </button>
                                );
                            })}
                        </div>

                        {selectedAnswer !== null && (
                            <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 mb-8 animate-in fade-in slide-in-from-bottom-2 shadow-sm">
                                <h3 className="text-blue-800 font-semibold mb-2 flex items-center gap-2">
                                    <InfoIcon /> Пояснення:
                                </h3>
                                <p className="text-blue-900 leading-relaxed text-sm sm:text-base">
                                    {currentQ.explanation}
                                </p>
                            </div>
                        )}

                        <div className="flex justify-end h-14">
                            {selectedAnswer !== null && (
                                <button onClick={handleNextQuestion} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl flex items-center gap-2 shadow-md">
                                    Наступне <ArrowRightIcon />
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
